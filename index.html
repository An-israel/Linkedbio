<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/touch-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#060607" />

    <title>Lynkit — Link it all.</title>
    <meta
      name="description"
      content="One free link for everything you make, sell, and stand for. Claim your username, add your links, pick from 20+ premium themes. Free forever."
    />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Lynkit" />
    <meta property="og:title" content="Lynkit — Link it all." />
    <meta
      property="og:description"
      content="One free link for everything you make, sell, and stand for. 20+ premium themes. Free forever."
    />
    <meta property="og:image" content="/og-default.svg" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Lynkit — Link it all." />
    <meta
      name="twitter:description"
      content="One free link for everything you make, sell, and stand for. Free forever."
    />
    <meta name="twitter:image" content="/og-default.svg" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Lynkit",
        "url": "https://lynkit.link",
        "description": "Free link-in-bio pages with premium themes.",
        "founder": { "@type": "Person", "name": "Aniekan Israel" }
      }
    </script>

    <!-- Fonts: Inter Tight (display), Inter (body), JetBrains Mono (labels) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@500;600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
